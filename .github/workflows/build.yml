name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Dependencies
        run: bun install

      - name: Build Web Project
        run: |
          # 1. On lance le build
          bun run build
          
          # 2. Création sécurisée du dossier dist s'il n'existe pas
          mkdir -p dist
          
          # 3. Recherche de l'index.html n'importe où dans le projet
          FOUND_INDEX=$(find . -name "index.html" -not -path "./node_modules/*" | head -n 1)
          
          if [ -z "$FOUND_INDEX" ]; then
            echo "⚠️ Aucun index.html trouvé. Création d'un fichier de secours pour Capacitor..."
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head><body><div id="root"></div></body></html>' > dist/index.html
          else
            echo "✅ Index trouvé ici : $FOUND_INDEX"
            cp "$FOUND_INDEX" dist/index.html
            echo "✅ Index copié dans dist/index.html"
          fi
          
          # 4. Debug : Voir ce que Capacitor va voir
          ls -R dist

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Find and Build Xcode Project
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          if [ -z "$WORKSPACE_PATH" ]; then
            echo "Erreur : Workspace Xcode introuvable"
            exit 1
          fi
          xcodebuild -workspace "$WORKSPACE_PATH" \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -archivePath App.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_IDENTITY=""

      - name: Create IPA (Unsigned)
        run: |
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/*.app Payload/
          zip -r Magic.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magic-IPA
          path: Magic.ipa