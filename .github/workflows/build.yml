name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Dependencies
        run: bun install

      - name: Build Web Project
        run: |
          # 1. On lance la création des fichiers
          bun run build
          
          # 2. On cherche l'index.html récursivement dans le dossier dist
          # On le déplace à la racine de dist pour que Capacitor soit content
          FOUND_INDEX=$(find dist -name "index.html" | head -n 1)
          
          if [ -n "$FOUND_INDEX" ]; then
            echo "✅ Index trouvé ici : $FOUND_INDEX"
            cp "$FOUND_INDEX" dist/index.html
            echo "✅ Index copié à la racine de ./dist"
          else
            echo "❌ ERREUR : Impossible de trouver index.html dans le dossier dist/"
            ls -R dist
            exit 1
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Find and Build Xcode Project
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          if [ -z "$WORKSPACE_PATH" ]; then
            echo "Erreur : Workspace Xcode introuvable"
            exit 1
          fi
          xcodebuild -workspace "$WORKSPACE_PATH" \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -archivePath App.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_IDENTITY=""

      - name: Create IPA (Unsigned)
        run: |
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/*.app Payload/
          zip -r Magic.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magic-IPA
          path: Magic.ipa