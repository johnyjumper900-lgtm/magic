name: Build iOS IPA
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Dependencies
        run: bun install

      - name: Build Web Project
        run: |
          bun run build
          # RÉPARATION : Si l'index est dans dist/client, on le remonte dans dist
          if [ -f "dist/client/index.html" ]; then
            cp dist/client/index.html dist/index.html
            echo "Index.html déplacé avec succès."
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Find and Build Xcode Project
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          if [ -z "$WORKSPACE_PATH" ]; then
            echo "Erreur : Workspace Xcode introuvable"
            exit 1
          fi
          xcodebuild -workspace "$WORKSPACE_PATH" \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -archivePath App.xcarchive \
                     archive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_IDENTITY=""

      - name: Create IPA (Unsigned)
        run: |
          mkdir -p Payload
          cp -r App.xcarchive/Products/Applications/*.app Payload/
          zip -r Magic.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Magic-IPA
          path: Magic.ipa